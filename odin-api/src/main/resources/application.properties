spring.application.name=odin-devops-api
server.port=8080
server.address=0.0.0.0

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/odin_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:odin_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:odin_pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

logging.level.org.springframework.jdbc.core=INFO
