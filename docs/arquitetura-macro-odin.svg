<svg width="1200" height="760" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="760" fill="#f7f9fc"/>

  <text x="600" y="45" text-anchor="middle" font-size="28" font-family="Arial" font-weight="bold">
    Arquitetura Macro - O.D.I.N. DevOps
  </text>

  <rect x="60" y="100" width="220" height="90" rx="12" fill="#ffffff" stroke="#1f4e79" stroke-width="3"/>
  <text x="170" y="135" text-anchor="middle" font-size="18" font-family="Arial" font-weight="bold">Usuario / Professor</text>
  <text x="170" y="165" text-anchor="middle" font-size="14" font-family="Arial">Acesso via navegador/curl</text>

  <line x1="280" y1="145" x2="420" y2="145" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="350" y="125" text-anchor="middle" font-size="14" font-family="Arial">HTTP :8080</text>

  <rect x="420" y="100" width="280" height="90" rx="12" fill="#ffffff" stroke="#0078d4" stroke-width="3"/>
  <text x="560" y="132" text-anchor="middle" font-size="18" font-family="Arial" font-weight="bold">IP Publico Azure</text>
  <text x="560" y="162" text-anchor="middle" font-size="15" font-family="Arial">20.116.61.147:8080</text>

  <line x1="560" y1="190" x2="560" y2="250" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="180" y="250" width="840" height="420" rx="18" fill="#e8f2ff" stroke="#0078d4" stroke-width="3"/>
  <text x="600" y="285" text-anchor="middle" font-size="22" font-family="Arial" font-weight="bold">
    VM Azure - Ubuntu Server 22.04 LTS
  </text>
  <text x="600" y="312" text-anchor="middle" font-size="15" font-family="Arial">
    vm-odin-devops | Docker + Docker Compose
  </text>

  <rect x="240" y="350" width="700" height="260" rx="14" fill="#ffffff" stroke="#555" stroke-width="2"/>
  <text x="590" y="380" text-anchor="middle" font-size="20" font-family="Arial" font-weight="bold">
    Rede Docker: odin-devops_odin-network
  </text>

  <rect x="280" y="420" width="260" height="120" rx="12" fill="#fff4e6" stroke="#ff8c00" stroke-width="3"/>
  <text x="410" y="450" text-anchor="middle" font-size="18" font-family="Arial" font-weight="bold">Container App</text>
  <text x="410" y="475" text-anchor="middle" font-size="14" font-family="Arial">app-odin-rm558771</text>
  <text x="410" y="498" text-anchor="middle" font-size="14" font-family="Arial">Java Spring Boot</text>
  <text x="410" y="521" text-anchor="middle" font-size="14" font-family="Arial">Porta 8080 | Usuario odinapp</text>

  <rect x="640" y="420" width="260" height="120" rx="12" fill="#e9f7ef" stroke="#1e8449" stroke-width="3"/>
  <text x="770" y="450" text-anchor="middle" font-size="18" font-family="Arial" font-weight="bold">Container Banco</text>
  <text x="770" y="475" text-anchor="middle" font-size="14" font-family="Arial">db-odin-rm558771</text>
  <text x="770" y="498" text-anchor="middle" font-size="14" font-family="Arial">MySQL 8.0</text>
  <text x="770" y="521" text-anchor="middle" font-size="14" font-family="Arial">Porta 3306</text>

  <line x1="540" y1="480" x2="640" y2="480" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="590" y="462" text-anchor="middle" font-size="14" font-family="Arial">JDBC</text>

  <rect x="640" y="610" width="260" height="70" rx="12" fill="#ffffff" stroke="#1e8449" stroke-width="3"/>
  <text x="770" y="638" text-anchor="middle" font-size="16" font-family="Arial" font-weight="bold">Volume nomeado</text>
  <text x="770" y="662" text-anchor="middle" font-size="14" font-family="Arial">odin_mysql_data_rm558771</text>

  <line x1="770" y1="540" x2="770" y2="610" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="80" y="690" width="1040" height="45" rx="8" fill="#ffffff" stroke="#777" stroke-width="1"/>
  <text x="600" y="718" text-anchor="middle" font-size="15" font-family="Arial">
    Fluxo: Usuario -> IP publico Azure -> VM Ubuntu -> Container App Java -> Container MySQL -> Volume nomeado
  </text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333"/>
    </marker>
  </defs>
</svg>
